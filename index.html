<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sondaggio Regalo Alessio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--blue:#08275a;--light:#f4fbff;--gold:#f1b84b;--ink:#17213a;--muted:#69758f;--green:#19a967;--red:#e24b4b}body{min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#dff5ff 0,#fff8ec 44%,#ffe0f1 100%);color:var(--ink);display:flex;align-items:center;justify-content:center;padding:18px;overflow-x:hidden}.app{width:100%;max-width:640px}.card{background:rgba(255,255,255,.95);border:1px solid rgba(8,39,90,.13);border-radius:28px;padding:28px 24px;box-shadow:0 18px 45px rgba(8,39,90,.18);text-align:center;position:relative;overflow:hidden}.card:before{content:"";position:absolute;inset:-80px auto auto -80px;width:170px;height:170px;background:#ffe8a5;border-radius:50%;opacity:.55}.card>*{position:relative;z-index:1}.badge{display:inline-block;background:var(--blue);color:white;border-radius:999px;padding:8px 14px;font-weight:900;font-size:12px;letter-spacing:.08em;margin-bottom:14px;text-transform:uppercase}h1{font-size:clamp(30px,7vw,50px);line-height:.96;color:var(--blue);letter-spacing:.04em;margin-bottom:10px}h2{font-size:clamp(22px,5.5vw,33px);color:var(--blue);margin:10px 0 16px}p{font-size:17px;line-height:1.45;color:#34405a;margin:10px 0}.small{font-size:13px;color:var(--muted)}.progressWrap{height:9px;background:#dde5ef;border-radius:99px;margin:12px 0 20px;overflow:hidden}.progress{height:100%;width:0;background:linear-gradient(90deg,#0d3d87,#2f87ff);border-radius:99px;transition:.35s}.questionNo{font-weight:900;color:var(--blue);font-size:13px;text-transform:uppercase;letter-spacing:.08em}.photo{width:100%;max-height:360px;object-fit:contain;background:#f6f8fb;border-radius:20px;margin:8px 0 18px;box-shadow:0 10px 24px rgba(0,0,0,.15)}.icon{font-size:72px;margin:10px 0 4px}.answers{display:grid;gap:12px;margin-top:18px;text-align:left}.answer{border:2px solid #e2e8f2;background:white;border-radius:16px;padding:14px 15px;cursor:pointer;font-weight:800;transition:.2s;display:flex;align-items:flex-start;gap:10px;line-height:1.25}.answer:hover{transform:translateY(-2px);border-color:#2f87ff;box-shadow:0 9px 20px rgba(47,135,255,.12)}.answer:before{content:"○";font-size:20px;color:#789;line-height:1}.answer.revealed.correct{background:#ecfff6;border-color:var(--green);color:#0c6c43}.answer.revealed.correct:before{content:"✓";color:var(--green);font-weight:900}.answer.revealed.wrong{background:#fff0f0;border-color:var(--red);color:#983232;opacity:.9}.answer.revealed.wrong:before{content:"✕";color:var(--red);font-weight:900}.answer.revealed.wrong:not(.chosen){opacity:.62}.feedback{min-height:42px;margin-top:16px;font-weight:900;color:var(--green)}.feedback.bad{color:var(--red)}.actions{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;margin-top:20px}button{border:0;border-radius:999px;background:var(--blue);color:white;padding:15px 24px;font-size:15px;font-weight:900;letter-spacing:.03em;cursor:pointer;box-shadow:0 10px 22px rgba(8,39,90,.28);transition:.2s}button:hover{transform:translateY(-2px) scale(1.02)}button.secondary{background:#eef4fb;color:var(--blue);box-shadow:none;border:1px solid #cbd8e8}button:disabled{opacity:.45;cursor:not-allowed;transform:none}.pulse{animation:pulse 1.2s infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}.shake{animation:shake .35s}@keyframes shake{25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}.loadbar{height:18px;border:2px solid var(--blue);border-radius:99px;overflow:hidden;background:white;margin:18px 0}.loadfill{height:100%;width:0;background:linear-gradient(90deg,#2f87ff,#20b26b);transition:2.4s}.results{text-align:left}.results li{list-style:none;margin:12px 0;font-size:17px}.results li:before{content:"✓";color:var(--green);font-weight:900;margin-right:10px}.finalTitle{font-size:clamp(36px,9vw,58px);color:var(--blue);line-height:1}.money{font-size:72px;animation:float 2s ease-in-out infinite}@keyframes float{50%{transform:translateY(-10px)}}.confetti{position:fixed;top:-10px;width:9px;height:14px;pointer-events:none;animation:fall 3s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}@media(max-width:480px){.card{padding:24px 18px;border-radius:24px}.answer{font-size:15px}}

.paypalBox{margin-top:24px;padding:20px;border:2px dashed rgba(8,39,90,.22);border-radius:22px;background:#f7fbff;text-align:center}.paypalIcon{width:112px;height:112px;border-radius:50%;background:white;margin:16px auto 8px;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 32px rgba(8,39,90,.22);cursor:pointer;border:2px solid #d9e8ff;transition:.2s}.paypalIcon:hover{transform:translateY(-3px) scale(1.04)}.paypalIcon span{font-size:24px;font-weight:900;color:#003087;letter-spacing:-.04em}.modalOverlay{position:fixed;inset:0;background:rgba(8,20,42,.65);display:flex;align-items:center;justify-content:center;padding:18px;z-index:999}.modal{background:white;border-radius:24px;max-width:380px;width:100%;padding:28px 22px;text-align:center;box-shadow:0 25px 80px rgba(0,0,0,.35);animation:pop .25s ease-out}.modal .pp{font-size:54px;font-weight:900;color:#003087;margin-bottom:10px}.modal h2{margin-bottom:8px}.modal p{font-size:16px}@keyframes pop{from{transform:scale(.86);opacity:0}to{transform:scale(1);opacity:1}}

button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
* { -webkit-tap-highlight-color: transparent; }
.safari-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:#08275a;color:white;text-align:center;padding:14px 16px;font-size:15px;font-weight:700;font-family:Arial,sans-serif}
.safari-banner a{color:#f1b84b;text-decoration:none}

const slides=[{"type": "intro"}, {"q": "Il soggetto Alessio conferma di aver raggiunto quota 30 anni?", "icon": "🎂", "a": ["Sì, purtroppo", "No, ne dimostra 24", "Non so / non ricordo", "Preferisco non rispondere"], "c": 0, "ok": "Dato anagrafico acquisito. Nessuno era davvero pronto.", "bad": ["La carta d’identità non collabora.", "Ci piacerebbe, ma no.", "Consultare calendario: 21 giugno.", "Risposta comoda, ma non valida."]}, {"q": "Riconosce almeno qualcuna delle persone presenti in questa foto?", "img": "gruppo", "a": ["Sì, sono i miei amici", "Vagamente", "Sembrano brave persone", "Non so rispondere"], "c": 0, "ok": "Campione emotivo riconosciuto correttamente.", "bad": ["Dai Ale, fai uno sforzo.", "Sono brave, ma anche molto pazienti.", "Troppo poco entusiasmo.", "Risposta respinta dal gruppo."]}, {"q": "Con quale frequenza Alessio e Gaetano discutono per motivi di importanza mondiale?", "img": "gaetano", "a": ["Mai", "Raramente", "Abbastanza spesso", "Dipende dalla Lazio"], "c": 3, "ok": "Risposta compatibile con anni di osservazioni sul campo.", "bad": ["Statisticamente impossibile.", "Risposta troppo ottimista.", "Ci siamo quasi, ma manca la variabile decisiva.", ""]}, {"q": "Quanto è realistico pensare che Alessio smetta di essere laziale sfegatato?", "img": "lazio", "a": ["Molto realistico", "Abbastanza realistico", "0%, dato scientifico", "Non so rispondere"], "c": 2, "ok": "Esatto. La lazialità è stata classificata come irreversibile.", "bad": ["Serve più realismo.", "No, siamo ancora nel campo della fantasia.", "", "Nel dubbio: Lazio. Sempre."]}, {"q": "Quando Alessio tiene segreta una cosa importante, quanto riesce a farla durare?", "icon": "👩‍❤️‍👨", "a": ["Due minuti", "Una settimana", "Mesi, con grande naturalezza", "Non ha mai segreti"], "c": 2, "ok": "Risposta registrata senza fare nomi. Siamo eleganti.", "bad": ["Troppo poco per il soggetto analizzato.", "Ancora sottostimato.", "", "Questa risposta ha fatto ridere il sistema."]}, {"q": "Qual è il vero punto debole del soggetto?", "icon": "❤️", "a": ["I soldi", "La Lazio", "I nipoti", "Tutte le precedenti, ma i nipoti vincono"], "c": 3, "ok": "Corretto. Qui il sondaggio diventa tenero.", "bad": ["Vero, ma non abbastanza.", "Vero, ma non basta.", "Vicinissimo: completa il quadro.", ""]}, {"q": "Secondo lei, queste persone le vogliono bene?", "img": "amici", "a": ["Abbastanza", "Moltissimo", "Più di quanto lui creda", "Non saprei"], "c": 2, "ok": "💚 Esatto. Questa è una delle poche certezze statisticamente dimostrate.", "bad": ["Troppo poco per il campione analizzato.", "Molto vicino, ma manca un po’ di poesia scientifica.", "", "Il sondaggio invita a fidarsi del gruppo."]}, {"q": "Quando riceve una busta come regalo, Alessio prova:", "icon": "💸", "a": ["Indifferenza", "Leggera felicità", "Grande felicità con sorriso sospetto", "Disagio"], "c": 2, "ok": "Analisi economico-emotiva confermata.", "bad": ["Non risulta da nessuna rilevazione.", "Stai minimizzando.", "", "Dato non credibile."]}, {"q": "Qual è il regalo che Alessio preferisce ricevere in assoluto?", "icon": "🎁", "a": ["Esperienze", "Oggetti", "Viaggi", "Soldi"], "c": 3, "ok": "Finalmente una risposta oggettiva.", "bad": ["Bello, ma non il preferito.", "Interessante, ma no.", "Sempre gradito, ma manca qualcosa.", ""]}, {"type": "loading"}, {"type": "final"}];
let i=0, selected=null;
const card=document.getElementById('card');
function totalQuestions(){return slides.filter(s=>s.q).length}
function progressIndex(){return slides.slice(0,i+1).filter(s=>s.q).length}
function pct(){return Math.round(progressIndex()/totalQuestions()*100)}
function render(){selected=null; const s=slides[i]; if(s.type==='intro') return intro(); if(s.type==='loading') return loading(); if(s.type==='final') return final(); question(s);}
function intro(){card.innerHTML=`<span class="badge">Sondaggio ufficiale</span><h1>ALESSIO 30</h1><p><b>Regolamento:</b> per ricevere il regalo devi rispondere correttamente a tutte le domande del sondaggio.</p><p class="small">Indagine anonima, ma non troppo. Durata stimata: 2 minuti. Livello di attendibilità: amici.</p><div class="icon">📋🎉</div><button class="pulse" onclick="next()">INIZIA IL SONDAGGIO →</button>`;}
function question(s){const n=progressIndex(); const media=s.img?`<img class="photo" src="${IMG[s.img]}">`:`<div class="icon">${s.icon||'❓'}</div>`;card.innerHTML=`<div class="questionNo">Domanda ${n} di ${totalQuestions()}</div><div class="progressWrap"><div class="progress" style="width:${pct()}%"></div></div>${media}<h2>${s.q}</h2><div class="answers">${s.a.map((x,idx)=>`<div class="answer" onclick="choose(${idx})">${x}</div>`).join('')}</div><div id="fb" class="feedback"></div><div class="actions"><button class="secondary" onclick="back()">← Indietro</button><button id="nextBtn" onclick="nextBlocked()" disabled>Avanti →</button></div>`;}
function choose(idx){selected=idx; const s=slides[i]; document.querySelectorAll('.answer').forEach((el,k)=>{el.classList.remove('revealed','correct','wrong','chosen'); if(k===idx){el.classList.add('revealed','chosen'); el.classList.add(idx===s.c?'correct':'wrong');}}); const fb=document.getElementById('fb'); const nextBtn=document.getElementById('nextBtn'); if(idx===s.c){fb.className='feedback'; fb.innerHTML='✅ '+s.ok; nextBtn.disabled=false; nextBtn.classList.add('pulse');} else {fb.className='feedback bad'; fb.innerHTML='❌ '+(s.bad[idx]||'Risposta non valida. Cambiare risposta per procedere.'); nextBtn.disabled=true; nextBtn.classList.remove('pulse'); card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');}}
function nextBlocked(){const b=document.getElementById('nextBtn'); if(b && b.disabled){card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');} else next();}
